version: 2.0
defaults:
  docker_network: pocx
  restart_policy: unless-stopped
  log_driver: json-file
  log_max_size: 10m
  log_max_files: 3
services:
- id: bitcoin-node
  name: Bitcoin-PoCX Node
  description: Full Bitcoin-PoCX node running bitcoind with PoC consensus
  category: infrastructure
  menu_label: '[Node]'
  documentation_url: https://github.com/PoC-Consortium/bitcoin
  enabled: true
  execution_mode: external
  container:
    image: bitcoin
    repository: ''
    default_tag: latest
    container_name_default: pocx-node
    working_dir: /root
    binary: bitcoind
  source:
    docker:
      dynamic:
        repository: https://github.com/ev1ls33d/pocx-wallet/pkgs/container/pocx-wallet%2Fbitcoin
        filter: latest|[0-9]\.[0-9]\.[0-9]
      images: []
    native:
      dynamic:
        repository: https://github.com/PoC-Consortium/bitcoin/releases
        filter: linux-gnu\.tar\.gz|win64\.zip
        whitelist:
        - bitcoind
        - bitcoin-cli
        - bitcoind.exe
        - bitcoin-cli.exe
      downloads: []
  ports:
  - name: rpc
    container_port: 18332
    host_port_default: 18332
    description: JSON-RPC API port for wallet and mining communication
    protocol: tcp
    optional: false
  - name: p2p
    container_port: 18333
    host_port_default: 18333
    description: P2P network port for node communication
    protocol: tcp
    optional: false
  - name: zmq-block
    container_port: 28332
    host_port_default: 28332
    description: ZeroMQ block notification port
    protocol: tcp
    optional: true
  - name: zmq-tx
    container_port: 28333
    host_port_default: 28333
    description: ZeroMQ transaction notification port
    protocol: tcp
    optional: true
  volumes:
  - name: data
    host_path_default: ./bitcoin-pocx
    container_path: /root/.bitcoin-pocx
    read_only: false
    description: Blockchain data, wallet files, and node configuration
    is_file: false
  environment:
  - name: TZ
    value: Europe/Berlin
    description: Timezone for the container
    sensitive: false
  external:
    parameters:
    - name: rpcconnect
      cli_flag: -rpcconnect
      type: string
      default: 127.0.0.1
      description: Remote host for external RPC connection
      category: connection
      required: false
      sensitive: false
      hidden: false
      value: 192.168.1.4
      has_user_value: true
    - name: rpcport
      cli_flag: -rpcport
      type: int
      default: 8332
      description: Remote port for external RPC connection
      category: connection
      required: false
      sensitive: false
      hidden: false
      value: 18332
      has_user_value: true
    - name: rpcuser
      cli_flag: -rpcuser
      type: string
      default: ''
      description: Username for external RPC connection
      category: connection
      required: false
      sensitive: false
      hidden: false
      value: miner
      has_user_value: true
    - name: rpcpassword
      cli_flag: -rpcpassword
      type: string
      default: ''
      description: Password for external RPC connection
      category: connection
      required: false
      sensitive: true
      hidden: false
      value: BlackPitOfMor1a
      has_user_value: true
  parameters:
  - name: addnode
    cli_flag: -addnode
    type: string[]
    default: []
    description: Add nodes to connect to (can specify multiple)
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: connect
    cli_flag: -connect
    type: string[]
    default: []
    description: Connect only to specified nodes
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: listen
    cli_flag: -listen
    type: bool
    default: true
    description: Accept connections from outside
    category: connection
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: maxconnections
    cli_flag: -maxconnections
    type: int
    default: 125
    description: Maximum number of inbound+outbound connections
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: port
    cli_flag: -port
    type: int
    default: 18333
    description: Listen for connections on this port
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: proxy
    cli_flag: -proxy
    type: string
    default: ''
    description: Connect through SOCKS5 proxy (ip:port)
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: onion
    cli_flag: -onion
    type: string
    default: ''
    description: Use separate SOCKS5 proxy for Tor hidden services
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: dns
    cli_flag: -dns
    type: bool
    default: true
    description: Allow DNS lookups for addnode, seed, connect
    category: connection
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: dnsseed
    cli_flag: -dnsseed
    type: bool
    default: true
    description: Query for peer addresses via DNS lookup
    category: connection
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: v2transport
    cli_flag: -v2transport
    type: bool
    default: false
    description: Enable BIP324 v2 encrypted P2P transport
    category: connection
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: onlynet
    cli_flag: -onlynet
    type: string
    default: ''
    description: Only connect to nodes on this network (ipv4, ipv6, onion, i2p, cjdns)
    category: connection
    required: false
    sensitive: false
    enum:
    - ''
    - ipv4
    - ipv6
    - onion
    - i2p
    - cjdns
    hidden: false
    use_equals: true
    has_user_value: false
  - name: bantime
    cli_flag: -bantime
    type: int
    default: 86400
    description: Default ban duration for misbehaving peers in seconds
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: externalip
    cli_flag: -externalip
    type: string
    default: ''
    description: Specify your own public IP address
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: maxuploadtarget
    cli_flag: -maxuploadtarget
    type: int
    default: 0
    description: Target bytes of outbound data per day (0=no limit)
    category: connection
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: listenonion
    cli_flag: -listenonion
    type: bool
    default: true
    description: Automatically create Tor hidden service and listen on it
    category: connection
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: rpcport
    cli_flag: -rpcport
    type: int
    default: 18332
    description: Listen for JSON-RPC connections on this port
    category: rpc
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: rpcbind
    cli_flag: -rpcbind
    type: string
    default: 0.0.0.0
    description: Bind to given address for JSON-RPC connections
    category: rpc
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    value: 0.0.0.0
    has_user_value: true
  - name: rpcallowip
    cli_flag: -rpcallowip
    type: string[]
    default:
    - 0.0.0.0/0
    description: Allow JSON-RPC connections from specified IPs/subnets
    category: rpc
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    value:
    - 0.0.0.0/0
    has_user_value: true
  - name: rpcuser
    cli_flag: -rpcuser
    type: string
    default: ''
    description: Username for JSON-RPC connections
    category: rpc
    required: false
    sensitive: true
    hidden: false
    use_equals: true
    has_user_value: false
  - name: rpcpassword
    cli_flag: -rpcpassword
    type: string
    default: ''
    description: Password for JSON-RPC connections
    category: rpc
    required: false
    sensitive: true
    hidden: false
    use_equals: true
    has_user_value: false
  - name: rpcauth
    cli_flag: -rpcauth
    type: string
    default: ''
    description: Username and HMAC-SHA-256 hashed password (user:salt$hash)
    category: rpc
    required: false
    sensitive: true
    hidden: false
    has_user_value: false
  - name: rpcthreads
    cli_flag: -rpcthreads
    type: int
    default: 4
    description: Number of threads for RPC server
    category: rpc
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: rpcworkqueue
    cli_flag: -rpcworkqueue
    type: int
    default: 16
    description: RPC server queue depth for pending requests
    category: rpc
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: rest
    cli_flag: -rest
    type: bool
    default: false
    description: Accept public REST requests (unauthenticated, read-only)
    category: rpc
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: disablewallet
    cli_flag: -disablewallet
    type: bool
    default: false
    description: Do not load the wallet and disable wallet RPC calls
    category: wallet
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: wallet
    cli_flag: -wallet
    type: string
    default: ''
    description: Specify wallet to load by name
    category: wallet
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: walletbroadcast
    cli_flag: -walletbroadcast
    type: bool
    default: true
    description: Broadcast transactions submitted via RPC
    category: wallet
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: fallbackfee
    cli_flag: -fallbackfee
    type: float
    default: 0.000001
    description: Use fallback fee
    category: wallet
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: printtoconsole
    cli_flag: -printtoconsole
    type: bool
    default: true
    description: Print logs to console (stdout)
    category: debug
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: debug
    cli_flag: -debug
    type: string
    default: ''
    description: Output debug info (all, net, tor, mempool, http, bench, coindb, etc.)
    category: debug
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: debugexclude
    cli_flag: -debugexclude
    type: string
    default: ''
    description: Exclude debug category from logging
    category: debug
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: logips
    cli_flag: -logips
    type: bool
    default: false
    description: Include IP addresses in debug output
    category: debug
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: logtimestamps
    cli_flag: -logtimestamps
    type: bool
    default: true
    description: Prepend debug output with timestamp
    category: debug
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: debuglogfile
    cli_flag: -debuglogfile
    type: string
    default: ''
    description: Specify debug log file location (relative paths prefixed by datadir)
    category: debug
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: loglevel
    cli_flag: -loglevel
    type: string
    default: ''
    description: Set global or per-category log severity level (trace, debug, info, warning, error)
    category: debug
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    has_user_value: false
  - name: txindex
    cli_flag: -txindex
    type: bool
    default: false
    description: Maintain a full transaction index
    category: index
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    value: true
    has_user_value: true
  - name: prune
    cli_flag: -prune
    type: int
    default: 0
    description: Reduce storage by pruning blocks (0=disable, 1=auto, N=target size MB)
    category: index
    required: false
    sensitive: false
    hidden: false
    use_equals: true
    value: 0
    has_user_value: true
  - name: reindex
    cli_flag: -reindex
    type: bool
    default: false
    description: Rebuild block chain index from scratch
    category: index
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: dbcache
    cli_flag: -dbcache
    type: int
    default: 450
    description: Database cache size in MB
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: par
    cli_flag: -par
    type: int
    default: 0
    description: Script verification threads (0=auto, -N=leave N cores free)
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: maxmempool
    cli_flag: -maxmempool
    type: int
    default: 300
    description: Maximum memory pool size in MB
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: mempoolexpiry
    cli_flag: -mempoolexpiry
    type: int
    default: 336
    description: Memory pool transaction expiry in hours
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: zmqpubrawblock
    cli_flag: -zmqpubrawblock
    type: string
    default: ''
    description: ZMQ endpoint for raw block publishing
    category: zmq
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: zmqpubrawtx
    cli_flag: -zmqpubrawtx
    type: string
    default: ''
    description: ZMQ endpoint for raw transaction publishing
    category: zmq
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: zmqpubhashblock
    cli_flag: -zmqpubhashblock
    type: string
    default: ''
    description: ZMQ endpoint for block hash publishing
    category: zmq
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: zmqpubhashtx
    cli_flag: -zmqpubhashtx
    type: string
    default: ''
    description: ZMQ endpoint for transaction hash publishing
    category: zmq
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: alertnotify
    cli_flag: -alertnotify
    type: string
    default: ''
    description: Execute command on alerts (%s in cmd is replaced by message)
    category: hooks
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: blocknotify
    cli_flag: -blocknotify
    type: string
    default: ''
    description: Execute command on best block change (%s = block hash)
    category: hooks
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: walletnotify
    cli_flag: -walletnotify
    type: string
    default: ''
    description: Execute command on wallet transaction (%s = TxID)
    category: hooks
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: startupnotify
    cli_flag: -startupnotify
    type: string
    default: ''
    description: Execute command on startup
    category: hooks
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: shutdownnotify
    cli_flag: -shutdownnotify
    type: string
    default: ''
    description: Execute command on shutdown
    category: hooks
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  depends_on: []
  health_check:
    command: bitcoin-cli getblockchaininfo
    interval_seconds: 30
    timeout_seconds: 10
    retries: 3
    start_period_seconds: 60
  menu:
    main_menu_order: 1
    submenu:
    - action: toggle
      label_running: Stop Node
      label_stopped: Start Node
    - action: logs
      label: View Logs
    - action: parameters
      label: Parameters
    - action: settings
      label: Settings
  settings:
  - key: RPC Port
    setting_path: BitcoinNode.RpcPort
    type: int
    category: network
    validation:
      min: 1024
      max: 65535
  - key: P2P Port
    setting_path: BitcoinNode.P2PPort
    type: int
    category: network
    validation:
      min: 1024
      max: 65535
  - key: Data Directory
    setting_path: BitcoinNode.DataDirectory
    type: path
    category: storage
  - key: Additional Parameters
    setting_path: BitcoinNode.AdditionalParams
    type: string
    category: advanced
    description: Extra command line arguments for bitcoind
  spawn_new_console: true
- id: electrs
  name: Electrs Server
  description: Electrum protocol server for lightweight wallet access and blockchain indexing
  category: infrastructure
  menu_label: '[Electrs]'
  documentation_url: https://github.com/PoC-Consortium/electrs-pocx
  enabled: true
  execution_mode: docker
  container:
    image: electrs
    repository: ''
    default_tag: latest
    container_name_default: pocx-electrs
    working_dir: /data
    binary: electrs
  source:
    docker:
      images:
      - repository: ghcr.io/ev1ls33d/pocx-wallet
        image: electrs
        tag: latest
        description: Latest development build
  ports:
  - name: http
    container_port: 3000
    host_port_default: 3000
    description: HTTP REST API for blockchain queries
    protocol: tcp
    optional: false
  - name: electrum-rpc
    container_port: 50001
    host_port_default: 50001
    description: Electrum protocol RPC port (mainnet)
    protocol: tcp
    optional: false
  - name: electrum-testnet
    container_port: 60001
    host_port_default: 60001
    description: Electrum protocol RPC port (testnet)
    protocol: tcp
    optional: false
  - name: monitoring
    container_port: 4224
    host_port_default: 4224
    description: Prometheus metrics endpoint
    protocol: tcp
    optional: true
  volumes:
  - name: data
    host_path_default: ./electrs-data
    container_path: /data
    read_only: false
    description: Electrs index database storage
    is_file: false
  - name: bitcoin-pocx
    host_path_default: ./bitcoin-pocx
    container_path: /root/.bitcoin-pocx
    read_only: true
    description: Bitcoin node data (read-only access for .cookie and blocks)
    is_file: false
  environment:
  - name: TZ
    value: Europe/Berlin
    description: Timezone for the container
    sensitive: false
  parameters:
  - name: verbosity
    cli_flag: -v
    type: int
    default: 0
    description: Increase logging verbosity (can specify multiple times)
    category: logging
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: timestamp
    cli_flag: --timestamp
    type: bool
    default: false
    description: Prepend log lines with a timestamp
    category: logging
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: network
    cli_flag: --network
    type: string
    default: testnet
    description: Select network type (mainnet, testnet, regtest, signet)
    category: network
    required: false
    sensitive: false
    enum:
    - mainnet
    - testnet
    - regtest
    - signet
    hidden: false
    has_user_value: false
  - name: db_dir
    cli_flag: --db-dir
    type: string
    default: /data
    description: Directory to store index database
    category: storage
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: daemon_dir
    cli_flag: --daemon-dir
    type: string
    default: /root/.bitcoin
    description: Data directory of bitcoind (for cookie auth)
    category: storage
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: blocks_dir
    cli_flag: --blocks-dir
    type: string
    default: ''
    description: 'Directory containing blk*. dat files (default: daemon_dir/blocks)'
    category: storage
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: daemon_rpc_addr
    cli_flag: --daemon-rpc-addr
    type: string
    default: 127.0.0.1:18332
    description: Bitcoin daemon JSON-RPC address
    category: connection
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: daemon_parallelism
    cli_flag: --daemon-parallelism
    type: int
    default: 1
    description: Number of parallel connections to the bitcoin daemon
    category: connection
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: cookie
    cli_flag: --cookie
    type: string
    default: ''
    description: JSONRPC authentication cookie (USER:PASSWORD)
    category: connection
    required: false
    sensitive: true
    hidden: false
    has_user_value: false
  - name: electrum_rpc_addr
    cli_flag: --electrum-rpc-addr
    type: string
    default: 0.0.0.0:50001
    description: Electrum server JSONRPC address
    category: server
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: http_addr
    cli_flag: --http-addr
    type: string
    default: 0.0.0.0:3000
    description: HTTP server address for REST API
    category: server
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: monitoring_addr
    cli_flag: --monitoring-addr
    type: string
    default: 127.0.0.1:4224
    description: Prometheus monitoring address
    category: server
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: zmq_addr
    cli_flag: --zmq-addr
    type: string
    default: ''
    description: ZMQ address of the bitcoin daemon
    category: connection
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: jsonrpc_import
    cli_flag: --jsonrpc-import
    type: bool
    default: false
    description: Use JSONRPC instead of direct blk*.dat import (for remote node)
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: lightmode
    cli_flag: --lightmode
    type: bool
    default: false
    description: Enable light mode for reduced storage requirements
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: initial_sync_compaction
    cli_flag: --initial-sync-compaction
    type: bool
    default: false
    description: Enable compaction during initial sync (requires more disk space but faster)
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: address_search
    cli_flag: --address-search
    type: bool
    default: false
    description: Enable prefix address search index
    category: index
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: index_unspendables
    cli_flag: --index-unspendables
    type: bool
    default: false
    description: Enable indexing of provably unspendable outputs
    category: index
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: utxos_limit
    cli_flag: --utxos-limit
    type: int
    default: 500
    description: Maximum number of UTXOs to process per address
    category: limits
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: electrum_txs_limit
    cli_flag: --electrum-txs-limit
    type: int
    default: 500
    description: Maximum transactions returned by Electrum history queries
    category: limits
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: electrum_banner
    cli_flag: --electrum-banner
    type: string
    default: ''
