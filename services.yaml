    value: Europe/Berlin
    description: Timezone for the container
    sensitive: false
  parameters:
  - name: config
    cli_flag: -c
    cli_alias: --config
    type: string
    default: /config/aggregator_config.yaml
    description: Path to aggregator configuration file
    category: config
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  config_file:
    format: yaml
    path_setting: Aggregator.ConfigPath
    options:
    - name: server
      type: object
      description: Server configuration for downstream miner connections
      category: server
      optional: false
      properties:
      - name: listen_address
        type: string
        default: 0.0.0.0:8080
        description: Address to listen on for miner connections
        optional: false
    - name: upstream
      type: object
      description: Upstream pool or wallet configuration
      category: upstream
      optional: false
      properties:
      - name: name
        type: string
        description: Pool/wallet name for identification
        optional: false
      - name: rpc_transport
        type: string
        default: http
        description: Transport protocol for upstream connection
        optional: false
      - name: rpc_host
        type: string
        description: Pool/wallet hostname or IP address (e.g., pool.example.com)
        optional: false
      - name: rpc_port
        type: int
        description: Pool/wallet RPC port
        optional: false
      - name: rpc_auth
        type: object
        description: Optional authentication for upstream connection
        optional: true
        properties:
        - name: token
          type: string
          default: ''
          description: Authentication token
          optional: false
      - name: submission_mode
        type: string
        default: pool
        description: 'Submission mode: pool (per-account best) or wallet (global best)'
        optional: false
      - name: block_time_secs
        type: int
        default: 120
        description: Expected block time in seconds (used for capacity estimation)
        optional: false
    - name: cache
      type: object
      description: Cache settings
      category: cache
      optional: false
      properties:
      - name: mining_info_ttl_secs
        type: int
        default: 5
        description: How long to cache mining info (in seconds)
        optional: false
      - name: pool_timeout_secs
        type: int
        default: 30
        description: Pool request timeout (in seconds)
        optional: false
    - name: database
      type: object
      description: Database settings
      category: database
      optional: false
      properties:
      - name: path
        type: string
        default: aggregator.db
        description: Database file path
        optional: false
      - name: retention_days
        type: int
        default: 7
        description: Retention period in days (0 = keep forever)
        optional: false
    - name: dashboard
      type: object
      description: Dashboard settings (optional)
      category: dashboard
      optional: true
      properties:
      - name: enabled
        type: bool
        default: true
        description: Enable web dashboard
        optional: false
      - name: listen_address
        type: string
        default: 0.0.0.0:8081
        description: Dashboard listen address
        optional: false
    - name: logging
      type: object
      description: Logging configuration
      category: logging
      optional: false
      properties:
      - name: level
        type: string
        default: info
        description: Log level
        optional: false
      - name: file
        type: string
        default: aggregator.log
        description: Log file path
        optional: false
  depends_on: []
  health_check:
    command: curl -sf http://localhost:8080/api/info || exit 1
    interval_seconds: 30
    timeout_seconds: 10
    retries: 3
    start_period_seconds: 10
  menu:
    main_menu_order: 4
    submenu:
    - action: toggle
      label_running: Stop Aggregator
      label_stopped: Start Aggregator
    - action: logs
      label: View Logs
    - action: parameters
      label: Parameters
    - action: settings
      label: Settings
  settings:
  - key: Repository
    setting_path: Aggregator.Repository
    type: string
    category: container
  - key: Tag
    setting_path: Aggregator.Tag
    type: string
    category: container
  - key: API Port
    setting_path: Aggregator.ApiPort
    type: int
    category: network
    validation:
      min: 1024
      max: 65535
  - key: Dashboard Port
    setting_path: Aggregator.DashboardPort
    type: int
    category: network
    validation:
      min: 1024
      max: 65535
  - key: Data Directory
    setting_path: Aggregator.DataDirectory
    type: path
    category: storage
  - key: Config Path
    setting_path: Aggregator.ConfigPath
    type: path
    category: config
  spawn_new_console: true
- id: miner
  name: PoCX Miner
  description: High-performance Proof-of-Capacity mining client with SIMD optimization
  category: mining
  menu_label: '[Mine]'
