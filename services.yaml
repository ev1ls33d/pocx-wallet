    default: 0
    description: Specific nonce to check (single mode only)
    category: mode
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: scoop
    cli_flag: -s
    cli_alias: --scoop
    type: int
    default: 0
    description: Specific scoop to check (single mode only)
    category: mode
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: base_target
    cli_flag: -b
    cli_alias: --base_target
    type: int
    default: 0
    description: Base target value to check against (required in single mode)
    category: mode
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: generation_signature
    cli_flag: -g
    cli_alias: --generation_signature
