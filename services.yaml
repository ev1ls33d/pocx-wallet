    cli_flag: --line-progress
    type: bool
    default: false
    description: Enable machine-parsable progress output for GUI
    category: output
    required: false
    sensitive: false
    hidden: true
    has_user_value: false
  config_file:
    format: yaml
    path_setting: MinerConfigPath
    options:
    - name: chains
      type: array
      description: Mining pool/wallet configurations
      category: pools
      optional: false
      items:
        type: object
        properties:
        - name: name
          type: string
          description: Pool/wallet name
          optional: false
        - name: base_url
          type: string
          description: Pool URL (e.g., http://pool.example.com:8080)
          optional: false
        - name: api_path
          type: string
          default: /pocx
          description: API endpoint path
          optional: false
        - name: accounts
          type: array
          description: ''
          optional: false
          items:
            type: object
            properties:
            - name: account
              type: string
              description: Account/address for mining rewards
              optional: false
    - name: plot_dirs
      type: array
      description: Directories containing plot files
      category: storage
      optional: false
      items:
        type: string
    - name: get_mining_info_interval
      type: int
      default: 1000
      description: Interval (ms) between getmininginfo requests
      category: timing
      optional: false
    - name: timeout
      type: int
      default: 5000
      description: Request timeout in milliseconds
      category: timing
      optional: false
    - name: hdd_use_direct_io
      type: bool
      default: true
      description: Use direct I/O for better performance (bypass OS cache)
      category: io
      optional: false
    - name: hdd_wakeup_after
      type: int
      default: 30
      description: Seconds before waking up idle HDDs
      category: io
      optional: false
    - name: hdd_read_cache_in_warps
      type: int
      default: 16
      description: Read cache size in warps
      category: io
      optional: false
    - name: cpu_threads
      type: int
      default: 0
      description: Number of CPU threads (0 = auto-detect)
      category: cpu
      optional: false
    - name: cpu_thread_pinning
      type: bool
      default: true
      description: Pin threads to specific CPU cores
      category: cpu
      optional: false
    - name: show_progress
      type: bool
      default: true
      description: Show mining progress bars
      category: display
      optional: false
    - name: line_progress
      type: bool
      default: false
      description: Machine-readable progress output
      category: display
      optional: false
    - name: enable_on_the_fly_compression
      type: bool
      default: true
      description: Enable on-the-fly plot scaling for compressed plots
      category: compression
      optional: false
    - name: benchmark
      type: string
      default: ''
      description: Run benchmark mode (i/o, cpu, or disabled)
      category: debug
      optional: false
    - name: console_log_level
      type: string
      default: Info
      description: Console log level
      category: logging
      optional: false
    - name: logfile_log_level
      type: string
      default: Warn
      description: Log file log level
      category: logging
      optional: false
    - name: logfile_max_count
      type: int
      default: 10
      description: Maximum number of log files to keep
      category: logging
      optional: false
    - name: logfile_max_size
      type: int
      default: 20
      description: Maximum log file size in MB
      category: logging
      optional: false
    - name: console_log_pattern
      type: string
      default: '{({d(%H:%M:%S)} [{l}]):16. 16} {m}{n}'
      description: Console log pattern format
      category: logging
      optional: false
    - name: logfile_log_pattern
      type: string
      default: '{({d(%Y-%m-%d %H:%M:%S)} [{l}]):26.26} {m}{n}'
      description: Log file pattern format
      category: logging
      optional: false
  depends_on:
  - service_id: bitcoin-node
    condition: running
    reason: Miner needs a running node to receive mining jobs
  health_check:
    command: pgrep -f pocx_miner
    interval_seconds: 30
    timeout_seconds: 5
    retries: 3
    start_period_seconds: 10
  menu:
    main_menu_order: 3
    submenu:
    - action: toggle
      label_running: Stop Miner
      label_stopped: Start Miner
    - action: logs
      label: View Logs
    - action: parameters
      label: Parameters
    - action: settings
      label: Settings
  settings:
  - key: Repository
    setting_path: Miner.Repository
    type: string
    category: container
  - key: Tag
    setting_path: Miner.Tag
    type: string
    category: container
  - key: CPU Threads
    setting_path: Miner.CpuThreads
    type: int
    category: performance
    validation:
      min: 0
      max: 128
  - key: Use Direct I/O
    setting_path: Miner.UseDirectIO
    type: bool
    category: performance
  - key: Show Progress
    setting_path: Miner.ShowProgress
    type: bool
    category: display
  - key: Additional Parameters
    setting_path: Miner.AdditionalParams
    type: string
    category: advanced
  spawn_new_console: true
