  - name: config
    host_path_default: ./miner_config.yaml
    container_path: /config/miner_config.yaml
    read_only: true
    description: Miner configuration file
    is_file: true
  environment:
  - name: TZ
    value: Europe/Berlin
    description: Timezone for the container
