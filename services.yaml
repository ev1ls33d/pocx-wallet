    main_menu_order: 0
    submenu: []
  spawn_new_console: true
- id: plotter-v2
  name: PoCX Plotter v2
  description: Next-generation plot file generator with async I/O, GPU support and multi-path plotting
  category: mining
  menu_label: '[Plot v2]'
  documentation_url: https://github.com/PoC-Consortium/pocx
  enabled: true
  execution_mode: native
  container:
    image: pocx
    repository: ''
    default_tag: latest
    container_name_default: pocx-plotter-v2
    working_dir: /plots
    binary: pocx_plotter_v2
  source:
    docker:
      dynamic:
        repository: https://github.com/ev1ls33d/pocx-wallet/pkgs/container/pocx-wallet%2Fpocx
        filter: latest|[0-9]\.[0-9]\.[0-9]
      images: []
    native:
      dynamic:
        repository: https://github.com/PoC-Consortium/pocx/releases/
        filter: unknown-linux-gnu-opencl\.tar\.gz|windows.*opencl\.zip
        whitelist:
        - pocx_plotter_v2
        - pocx_plotter_v2.exe
      downloads: []
  ports: []
  volumes:
  - name: plots
    host_path_default: ./plots
    container_path: /plots
    read_only: false
    description: Output directory for generated plot files
    is_file: false
  environment:
  - name: TZ
    value: Europe/Berlin
    description: Timezone for the container
    sensitive: false
  parameters:
  - name: address
    cli_flag: -i
    cli_alias: --id
    type: string
    description: Your PoCX mining address
    category: identity
    required: true
    sensitive: false
    hidden: false
    value: <pocx1qYourWalletAddressHere>
    has_user_value: true
  - name: warps
    cli_flag: -w
    cli_alias: --warps
    type: int
    description: Number of warps to plot (1 warp = 1 GiB)
    category: size
    required: true
    sensitive: false
    hidden: false
    value: 976
    has_user_value: true
  - name: number
    cli_flag: -n
    cli_alias: --num
    type: int
    default: 1
    description: Number of plot files to create (0 = fill disk)
    category: size
    required: false
    sensitive: false
    hidden: false
    value: 0
    has_user_value: true
  - name: path
    cli_flag: -p
    cli_alias: --path
    type: string[]
    default:
    - /plots
    description: Target disk path(s) for plot files (repeatable, e.g. -p /disk1 -p /disk2)
    category: output
    required: false
    sensitive: false
    hidden: false
    value:
    - .
    has_user_value: true
  - name: compression
    cli_flag: -x
    cli_alias: --compression
    type: int
    default: 1
    description: Compression level 1-6 (higher = more PoW stored per plot)
    category: compression
    required: false
    sensitive: false
    validation:
      min: 1
      max: 6
    hidden: false
    has_user_value: false
  - name: seed
    cli_flag: -s
    cli_alias: --seed
    type: string[]
    default: []
    description: Seed(s) to resume unfinished plot(s), one per -p path
    category: resume
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: cpu
    cli_flag: -c
    cli_alias: --cpu
    type: int
    default: 0
    description: CPU-only mode with N threads (0 = auto-detect), conflicts with --gpu
    category: cpu
    required: false
    sensitive: false
    hidden: false
    value: 0
    has_user_value: true
  - name: gpu
    cli_flag: -g
    cli_alias: --gpu
    type: string
    default: ''
    description: GPU to use for plotting (e.g. 0:0 or 0:0:1024), conflicts with --cpu
    category: gpu
    required: false
    sensitive: false
    feature: opencl
    hidden: false
    value: ''
    has_user_value: true
  - name: opencl
    cli_flag: -o
    cli_alias: --opencl
    type: bool
    default: false
    description: Display OpenCL platforms and devices
    category: gpu
    required: false
    sensitive: false
    feature: opencl
    hidden: false
    has_user_value: false
  - name: kws_override
    cli_flag: -k
    cli_alias: --kws-override
    type: int
    default: 0
    description: Override GPU kernel workgroup size (advanced)
    category: gpu
    required: false
    sensitive: false
    feature: opencl
    hidden: false
    has_user_value: false
  - name: escalate
    cli_flag: -e
    cli_alias: --escalate
    type: int
    default: 1
    description: Write buffer size multiplier (e.g. -e 5 = 5 GiB buffer)
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: async_write
    cli_flag: -a
    cli_alias: --async-write
    type: bool
    default: false
    description: Enable extra write buffer for hashing/writing overlap
    category: performance
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: disable_direct_io
    cli_flag: -d
    cli_alias: --ddio
    type: bool
    default: false
    description: Disable direct I/O (use OS caching)
    category: io
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: low_priority
    cli_flag: -l
    cli_alias: --lowprio
    type: bool
    default: false
    description: Run plotter with low process priority
    category: process
    required: false
    sensitive: false
    hidden: false
    value: true
    has_user_value: true
  - name: quiet
    cli_flag: -q
    cli_alias: --quiet
    type: bool
    default: false
    description: Suppress verbose output
    category: output
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  - name: benchmark
    cli_flag: -b
    cli_alias: --bench
    type: bool
    default: false
    description: Benchmark mode (no disk writes)
    category: debug
    required: false
    sensitive: false
    hidden: false
    has_user_value: false
  depends_on: []
  health_check:
    command: pgrep -f pocx_plotter_v2
    interval_seconds: 30
    timeout_seconds: 5
    retries: 3
    start_period_seconds: 5
  menu:
    main_menu_order: 5
    submenu:
    - action: toggle
      label_running: Stop Plotter v2
      label_stopped: Start Plotter v2
    - action: logs
      label: View Logs
    - action: parameters
      label: Parameters
    - action: settings
      label: Settings
  settings:
  - key: Repository
    setting_path: PlotterV2.Repository
    type: string
    category: container
  - key: Tag
    setting_path: PlotterV2.Tag
    type: string
    category: container
  - key: Default Warps
    setting_path: PlotterV2.DefaultWarps
    type: int
    category: plotting
    validation:
      min: 1
      max: 1000000
  - key: CPU Threads
    setting_path: PlotterV2.CpuThreads
    type: int
    category: performance
    validation:
      min: 0
      max: 128
  - key: Use Direct I/O
    setting_path: PlotterV2.UseDirectIO
    type: bool
    category: performance
  - key: Additional Parameters
    setting_path: PlotterV2.AdditionalParams
    type: string
    category: advanced
  spawn_new_console: true
